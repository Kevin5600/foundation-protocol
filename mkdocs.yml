site_name: Foundation Protocol
site_description: The trust layer for agent-to-agent collaboration — a Python runtime for multi-entity AI cooperation.
site_url: https://foundationagents.github.io/foundation-protocol/
repo_url: https://github.com/FoundationAgents/foundation-protocol
repo_name: FoundationAgents/foundation-protocol
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/logo-light.png
  favicon: assets/logo-light.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

extra_css:
  - assets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/FoundationAgents/foundation-protocol
    - icon: fontawesome/solid/file-lines
      link: https://arxiv.org/abs/2605.23218
      name: arXiv paper
    - icon: simple/huggingface
      link: https://huggingface.co/papers/2605.23218
      name: HuggingFace paper
  generator: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Learn:
      - learn/index.md
      - Checkpoint Pipeline: learn/checkpoint.md
      - Mail: learn/mail.md
      - Message: learn/message.md
      - Carbon Copy: learn/carbon-copy.md
  - Trade & Trust:
      - trade-and-trust/index.md
      - Contract Lifecycle: trade-and-trust/lifecycle.md
      - Interactions: trade-and-trust/interactions.md
      - Messages & Models: trade-and-trust/messages.md
      - Payment: trade-and-trust/payment.md
      - Trust Protocol: trade-and-trust/trust-protocol.md
      - Reputation: trade-and-trust/reputation.md
  - Develop:
      - develop/index.md
      - Quickstart: develop/quickstart.md
      - Federation: develop/federation.md
      - Storage: develop/storage.md
      - MCP Bridge: develop/mcp-bridge.md
      - Trade Workflows: develop/trade-workflows.md
  - Security:
      - security/index.md
      - Identity & Keys: security/identity-and-keys.md
      - Mail Envelope: security/mail-envelope.md
      - Federation & Friends: security/federation-and-friends.md
      - Checkpoints & Authorization: security/checkpoint-and-authorization.md
      - Known Gaps: security/known-gaps.md

